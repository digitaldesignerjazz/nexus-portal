<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Portal • Gateway</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050815;
      --accent: #5cf5ff;
      --text: #e8f4ff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #10304c 0%, #050815 48%, #02040c 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 720px;
    }
    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.04em;
    }
    .tagline {
      font-size: 1.25rem;
      color: #94b3ff;
      margin-bottom: 2.5rem;
    }
    .launch-btn {
      display: inline-block;
      background: #5cf5ff;
      color: #050815;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 1rem 2.5rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(92, 245, 255, 0.3);
    }
    .launch-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(92, 245, 255, 0.4);
    }
    .links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #94b3ff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .links a:hover {
      color: #5cf5ff;
    }
    .footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NEXUS PORTAL</h1>
    <p class="tagline">Central Gateway to the Decentralized Mesh • AI Swarms • Blockchain • Prototypes</p>
    
    <a href="docs/" class="launch-btn">Launch Cyberpunk Interface →</a>

    <div class="links">
      <a href="README.md" target="_blank">README</a>
      <a href="https://github.com/digitaldesignerjazz/nexus" target="_blank">Core Nexus Repo</a>
      <a href="https://github.com/digitaldesignerjazz/swarm" target="_blank">AI Swarm</a>
      <a href="https://x.com/SirLancelotEsq" target="_blank">@SirLancelotEsq on X</a>
    </div>

    <div class="footer">
      Part of the Esslinger & Co. decentralized ecosystem • Hannover • 2026
    </div>
  </div>
</body>
</html>
